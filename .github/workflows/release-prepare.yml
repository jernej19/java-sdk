name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.1.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Read current version
        id: current
        run: |
          CURRENT=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          git checkout -b "release/v${{ inputs.version }}"

      - name: Bump version in build.gradle.kts
        run: |
          sed -i 's/version = "${{ steps.current.outputs.version }}"/version = "${{ inputs.version }}"/' build.gradle.kts

      - name: Update version in README.md
        run: |
          sed -i 's/${{ steps.current.outputs.version }}/${{ inputs.version }}/g' README.md

      - name: Update version in QUICKSTART.md
        run: |
          sed -i 's/pandascore-sdk-java:${{ steps.current.outputs.version }}/pandascore-sdk-java:${{ inputs.version }}/g' QUICKSTART.md
          sed -i 's/<version>${{ steps.current.outputs.version }}<\/version>/<version>${{ inputs.version }}<\/version>/g' QUICKSTART.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts README.md QUICKSTART.md
          git commit -m "Bump version to ${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ inputs.version }}
          path: |
            build/libs/*.jar
          retention-days: 30

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ inputs.version }}" \
            --title "Release v${{ inputs.version }}" \
            --label "release" \
            --body "## Release v${{ inputs.version }}

          **Version bump:** \`${{ steps.current.outputs.version }}\` → \`${{ inputs.version }}\`

          ### Artifacts
          Built JARs are attached to the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          ### Review checklist
          - [ ] CHANGELOG.md updated with new version section
          - [ ] Version references are correct in build.gradle.kts, README.md, QUICKSTART.md
          - [ ] Tests pass (see CI below)
          - [ ] Artifacts look good (download from workflow run)

          > When ready to publish, trigger the **Publish to GitHub Packages** workflow."
